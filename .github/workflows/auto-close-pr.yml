name: Auto Close Unvouched PR

on:
  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Check if user is vouched
        id: check
        run: |
          if grep -q "@${{ github.actor }}" .github/VOUCHED.md; then
            echo "vouched=true" >> $GITHUB_OUTPUT
          else
            echo "vouched=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment and close PR
        if: steps.check.outputs.vouched == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Obrigado pela contribuição, @${author}!

Este repositório utiliza um sistema de *vouch* para garantir qualidade nas contribuições.

Pull Requests de usuários não-vouched são automaticamente fechados.

Para contribuir:
1. Abra uma Discussion na categoria **Vouch Request**
2. Aguarde aprovação de um maintainer
3. Após isso, você poderá abrir PRs normalmente

Obrigado pela compreensão 🙏`
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: "closed"
            });